    <script>
      // Load analytics only when Vite has replaced the placeholders.
      (function () {
        var analyticsUrl = '%VITE_ANALYTICS_ENDPOINT%';
        var analyticsSite = '%VITE_ANALYTICS_WEBSITE_ID%';
        if (analyticsUrl && !analyticsUrl.includes('%')) {
          try {
            var s = document.createElement('script');
            s.defer = true;
            s.src = analyticsUrl.replace(/\/+$/, '') + '/umami';
            s.setAttribute('data-website-id', analyticsSite);
            document.head.appendChild(s);
          } catch (e) {
            console.warn('Failed to load analytics', e);
          }
        }
      })();
    </script>
